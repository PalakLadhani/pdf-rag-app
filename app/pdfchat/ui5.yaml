# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: pdfchat
type: application
server:
  customMiddleware:
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertErrors: false
        ui5:
          path:
            - /resources
            - /test-resources
          url: https://ui5.sap.com

    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300

    - name: fiori-tools-preview
      afterMiddleware: fiori-tools-appreload
      configuration:
        flp:
          theme: sap_horizon

    # =======================================================
    # PROXY TO PYTHON AI SERVICE
    # Any request to /ai/* from the browser is forwarded to
    # http://localhost:8000/* (our FastAPI server).
    # Example: fetch('/ai/health') -> GET http://localhost:8000/health
    # =======================================================
    - name: ui5-middleware-simpleproxy
      afterMiddleware: fiori-tools-preview
      mountPath: /ai
      configuration:
        baseUri: "http://localhost:8000"